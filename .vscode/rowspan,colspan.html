<!--
colspan
td 태그에서 사용 좌우 열 확장

rowspan 
td태그에서 사용 상하열 확장

<td colspan="2"><td>    좌우 2칸 확장

<td rowspan="2"><td>    상하 2칸 확장
-->

<table>
    <tr>
        <td colspan="2">abc</td>
    </tr>
    <tr>
        <td>adf</td>
        <td>daf</td>
    </tr>
</table>



<table>
    <tr>
        <td rowspan="2">dafa</td>
        <td>ㅅㅁㄹ</td>
    </tr>
    <tr>
        <td>dasfsfd</td>
    </tr>
</table>
